backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/mao-tcm   # ← 改成你的 GitHub 帳號/repo 名稱
  branch: main

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: articles
    label: 衛教文章
    label_singular: 文章
    folder: content/articles
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: 標題, name: title, widget: string }
      - { label: 發布日期, name: date, widget: datetime, format: "YYYY-MM-DD" }
      - label: 分類
        name: category
        widget: select
        options:
          - 中醫減重
          - 小兒中醫
          - 美顏針灸
          - 內科調理
          - 體質養生
          - 中醫知識
      - { label: 摘要, name: excerpt, widget: text }
      - { label: 封面圖片, name: cover, widget: image, required: false }
      - { label: 文章內容, name: body, widget: markdown }
